    <script>
        // Data encoded in Base64
        const c = {

            e: 'a3BlZXJhcGF0aGFuYW5vbnRAbmVvZ2VuLmNvbQ==',
            l: 'a2Fqb3Jua2VhdC5w',
            b: 'aHR0cHM6Ly9vdXRsb29rLm9mZmljZS5jb20vYm9va3dpdGhtZS91c2VyLzRjYjIxYTBiMDc5ZDQ3NTc5ZDM5YzUwYWZjYTRiYTU4QG5lb2dlbi5jb20vbWVldGluZ3R5cGUvM3JydE1yTmZKazZjNzVEd1hxQ2xQUTI/Ym9va2luZ2NvZGU9MzMwMzg1NjctM2RmZS00ZWE1LTg4NjYtN2JmZTg3OTk3OWQ4JmFub255bW91cyZpc21zYWxqc2F1dGhlbmFibGVkJmVwPW1saW5r'
        };

        const d = (s) => atob(s);

        function secureDownload() {
            const vData = [
                'BEGIN:VCARD', 'VERSION:3.0',
                'FN:Kajornkeat (Bank) Peerapathananont',
                'N:Peerapathananont;Kajornkeat (Bank);;;',
                'ORG:Neogen APAC', 'TITLE:Country Sales Leader',
                'TEL;TYPE=CELL,VOICE:' + d(c.m),
                'EMAIL;TYPE=PREF,INTERNET:' + d(c.e),
                'URL:https://kajornkeat.com/',
                'REV:' + new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z',
                'END:VCARD'
            ].join('\n');
            const b = new Blob([vData], { type: 'text/vcard' });
            const u = window.URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = 'Bank_Neogen.vcf'; a.click();
        }

        function secureWA() { window.open('https://wa.me/' + d(c.m).replace('+', ''), '_blank'); }
        function secureLine() { window.open('https://line.me/ti/p/~' + d(c.l), '_blank'); }
        function secureBook() { window.open(d(c.b), '_blank'); }
        
        function secureCall() {
            const el = document.getElementById('phone-display');
            if (el.innerText.includes("reveal")) { el.innerText = "+66 8 3030 1501"; } 
            else { window.location.href = "tel:" + d(c.m); }
        }

        function secureEmail() {
            const el = document.getElementById('email-display');
            if (el.innerText.includes("reveal")) { el.innerText = d(c.e); } 
            else { window.location.href = "mailto:" + d(c.e); }
        }

        async function handleShare() {
            const s = { title: 'Kajornkeat (Bank) | Neogen APAC', text: 'Connect with Bank, Country Sales Leader at Neogen.', url: 'https://kajornkeat.com' };
            if (navigator.share) { try { await navigator.share(s); } catch (e) {} } 
            else {
                const el = document.createElement('textarea'); el.value = s.url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
            }
        }
    </script>
